name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npx tsc -p ./

      - name: Package VSIX
        run: npx vsce package --allow-missing-repository --no-gallery

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Cursor Comet ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            *.vsix
          generate_release_notes: true
          draft: false
          prerelease: false
